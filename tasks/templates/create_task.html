{% extends 'base.html' %}

{% block content %}
<main class="container">
    <div class="row">
        <div class="col-md-4 offset-md-4 my-5">
            <form action="{% url 'create_task' %}" method="post" class="card card-body">
                <h1 class="text-center">Create task</h1>
                
                {{error}}
                {% csrf_token %}

                {{form}}

                <button class="btn btn-primary">
                    Create
                </button>
            </form>
        </div>
    </div>
</main>
{% endblock %}
